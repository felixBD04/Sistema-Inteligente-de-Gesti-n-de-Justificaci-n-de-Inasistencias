<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario de Inasistencia</title>
</head>
<body>

  <h2>Justificación de Inasistencia</h2>

  <form id="formulario">

    <label>Nombre:</label><br>
    <input type="text" name="nombre" required><br><br>

    <label>ID:</label><br>
    <input type="text" name="id" required><br><br>

    <label>Correo:</label><br>
    <input type="email" name="correo" required><br><br>

    <label>Motivo:</label><br>
    <select name="motivo" required>
      <option value="">Selecciona uno</option>
      <option value="enfermedad">Enfermedad</option>
      <option value="problema_familiar">Problema familiar</option>
      <option value="cita_medica">Cita médica</option>
      <option value="otro">Otro</option>
    </select><br><br>

    <label>Documento de soporte:</label><br>
    <input type="file" name="archivo" required><br><br>

    <button type="submit">Enviar</button>

  </form>

  <script>
    const form = document.getElementById("formulario");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);

      try {
        const response = await fetch("https://felix04.app.n8n.cloud/webhook-test/Sistema_Inteligente_de_Gestión_de_Justificación_de_Inasistencias", {
          method: "POST",
          body: formData
        });

        if (response.ok) {
          alert("Datos enviados correctamente 🚀");
          form.reset();
        } else {
          alert("Error al enviar");
        }

      } catch (error) {
        console.error(error);
        alert("Error de conexión");
      }
    });
  </script>

</body>
</html>
